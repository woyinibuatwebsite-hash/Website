<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXOVER V8 - SCRIPT ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0A0A0C; color: #EEE; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }

        /* Header Rebrand */
        .header { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .header h1 { font-family: 'Audiowide', cursive; color: #FF0033; font-size: 22px; text-shadow: 0 0 10px rgba(255, 0, 51, 0.3); }
        .nav-links { margin-top: 10px; display: flex; gap: 10px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 12px; border: 1px solid #333; padding: 5px 12px; border-radius: 5px; transition: 0.3s; }
        .nav-links a:hover { background: #FF0033; color: white; border-color: #FF0033; }

        /* Card System */
        .section-card { background: #151518; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section-title { font-size: 15px; font-weight: 600; color: #FF0033; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        /* Input & Area */
        input, textarea {
            width: 100%; background: #000; border: 1px solid #333; border-radius: 8px;
            padding: 12px; color: #00FF41; font-family: monospace; font-size: 13px; outline: none; margin-bottom: 12px;
        }
        input:focus, textarea:focus { border-color: #FF0033; }
        textarea { height: 200px; resize: none; }

        /* Buttons */
        .btn-action {
            width: 100%; padding: 12px; background: #FF0033; color: white; border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-action:hover { background: #CC0029; box-shadow: 0 0 15px rgba(255, 0, 51, 0.4); }

        .footer-tag { text-align: center; color: #444; font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>EXOVER V8 ENGINE</h1>
            <div class="nav-links">
                <a href="#">Admin</a>
                <a href="#">Support</a>
                <a href="index.html">Logout</a>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">🔴 TAMBAH DATABASE NUMBER</div>
            <input type="text" id="dbNumber" placeholder="Contoh: 6281234567890">
            <button class="btn-action" onclick="saveNumber()">SAVE NUMBER</button>
        </div>

        <div class="section-card">
            <div class="section-title">💻 DATABASE SCRIPT EXOVER</div>
            <textarea id="dbScript" placeholder="// Tempelkan Database Script Lu Di Sini, KNTL..."></textarea>
            <button class="btn-action" style="background: #FFF; color: #000;" onclick="deployScript()">DEPLOY SCRIPT</button>
        </div>

        <div class="footer-tag">
            ┌──────────────┐<br>
            │ EXOVER SYSTEM │<br>
            └──────────────┘
        </div>
    </div>

    <script>
        // Logic Simple
        function saveNumber() {
            const num = document.getElementById('dbNumber').value;
            if(num) {
                alert("Nomor " + num + " Berhasil Disimpan ke Engine!");
            } else { alert("Isi Nomornya Dulu, Goblok!"); }
        }

        function deployScript() {
            const script = document.getElementById('dbScript').value;
            if(script) {
                alert("Script Sedang Di-Deploy ke Database Exover...");
                console.log("Deploying: ", script);
            } else { alert("Mana Scriptnya? Kosong Gini!"); }
        }

        // Cek Auth Session
        if(sessionStorage.getItem("isAuth") !== "true") {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
