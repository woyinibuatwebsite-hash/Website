<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD DATABASE EXOVER V8</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0F0F12; color: #FFFFFF; display: flex; justify-content: center; height: 100vh; padding: 20px; overflow-y: auto; }
        .wrapper { width: 100%; max-width: 450px; }

        /* HEADER SECTION */
        .header { margin-bottom: 25px; }
        .header h1 { font-size: 24px; font-weight: 700; color: #FFFFFF; margin-bottom: 15px; }
        .header-buttons { display: flex; flex-wrap: wrap; gap: 10px; }
        .btn-header { display: flex; align-items: center; gap: 8px; padding: 8px 15px; border-radius: 50px; font-size: 14px; text-decoration: none; cursor: pointer; transition: 0.3s; }
        
        /* Warna Merah Tua/Dark Red */
        .btn-admin { background-color: #2F1818; color: #FF4D4D; }
        .btn-owner { background-color: #2F1818; color: #FF4D4D; }
        .btn-logout { background-color: #2F1818; color: #FF4D4D; }
        .btn-header:hover { opacity: 0.8; }

        /* CARD STYLE */
        .card { background-color: #1A1A1E; border-radius: 20px; border: 1px solid #222; padding: 20px; margin-bottom: 20px; }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; color: #FF4D4D; }
        .card-header h2 { font-size: 18px; font-weight: 600; color: #FFFFFF; }

        /* INPUTS & BUTTONS IN CARD */
        input[type="text"], input[type="search"] {
            width: 100%; padding: 12px 15px; background-color: #121215;
            border: 1px solid #2A2A30; border-radius: 10px; color: #FFFFFF;
            font-size: 14px; outline: none; transition: 0.3s;
        }
        input::placeholder { color: #666; }
        input[type="text"]:focus, input[type="search"]:focus { border-color: #FF4D4D; }

        .btn-simpan {
            display: inline-flex; align-items: center; gap: 8px;
            margin-top: 15px; padding: 10px 20px; background-color: #EE2B2B;
            color: #FFFFFF; border: none; border-radius: 10px; font-weight: 600;
            font-size: 14px; cursor: pointer; transition: 0.3s;
        }
        .btn-simpan:hover { background-color: #D31D1D; }

        .btn-search {
            display: inline-flex; align-items: center; gap: 8px;
            margin-top: 15px; padding: 10px 20px; background-color: #FFFFFF;
            color: #111111; border: none; border-radius: 10px; font-weight: 600;
            font-size: 14px; cursor: pointer; transition: 0.3s;
        }
        .btn-search:hover { background-color: #E0E0E0; }

        /* TOKEN/NUMBER LIST */
        .token-item {
            display: flex; justify-content: space-between; align-items: center;
            background-color: #121215; padding: 15px; border-radius: 12px;
            margin-bottom: 10px; border: 1px solid #222;
        }
        .token-info { display: flex; flex-direction: column; gap: 2px; }
        .token-val { font-family: monospace; font-size: 12px; color: #B0B0B0; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .btn-hapus {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 12px; background-color: #2F1818;
            color: #FF4D4D; border: none; border-radius: 8px; font-weight: 600;
            font-size: 12px; cursor: pointer; transition: 0.3s;
        }
        .btn-hapus:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="wrapper">
        
        <div class="header">
            <h1>DATABASE EXOVER V8</h1>
            <div class="header-buttons">
                <a href="#" class="btn-header btn-admin">👤 Admin</a>
                <a href="#" class="btn-header btn-owner">📱 Hubungi Owner</a>
                <a href="index.html" class="btn-header btn-logout">➡Logout</a>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                🔴<h2>Tambah Database Number</h2>
            </div>
            <form id="addNumberForm">
                <input type="text" id="newNumber" placeholder="Masukkan nomor database baru..." required>
                <button type="submit" class="btn-simpan">💾 Simpan</button>
            </form>
        </div>

        <div class="card">
            <div class="card-header">
                🔍<h2>Cari Nomor Database</h2>
            </div>
            <form id="searchForm">
                <input type="search" id="searchInput" placeholder="Cari nomor...">
                <button type="submit" class="btn-search">🔎 Cari</button>
            </form>
        </div>

        <div class="card">
            <div class="card-header">
                🔑<h2>Daftar Database Number</h2>
            </div>
            <div id="numberList">
                <div class="token-item">
                    <div class="token-info">
                        <span class="token-val">62812XXXXXX: AAGjJWsTuzMyLu9f9ynA0g...</span>
                    </div>
                    <button class="btn-hapus">🗑️ Hapus</button>
                </div>
                <div class="token-item">
                    <div class="token-info">
                        <span class="token-val">62822XXXXXX: AAFsMgQHQ3ZsUis...</span>
                    </div>
                    <button class="btn-hapus">🗑️ Hapus</button>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
