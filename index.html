<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATABASE EXOVER V8 - LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#050507; color:#fff; font-family:'Poppins', sans-serif; height:100vh; overflow:hidden; }
        .wrapper { width:100%; height:100%; background:linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://images.alphacoders.com/131/1311090.jpeg') center/cover; display:flex; justify-content:center; align-items:center; }
        .box { background:rgba(20,20,25,0.9); padding:40px; border-radius:20px; box-shadow:0 0 30px rgba(255, 0, 51, 0.2); width:100%; max-width:380px; text-align:center; border:1px solid rgba(255, 0, 51, 0.3); backdrop-filter: blur(10px); }
        h1 { font-family:'Audiowide'; color:#FF0033; margin-bottom:25px; font-size:20px; text-transform: uppercase; }
        input { width:100%; padding:14px; background:rgba(0,0,0,0.5); border:1px solid #333; border-radius:10px; color:#fff; margin-bottom:15px; outline:none; transition: 0.3s; }
        input:focus { border-color: #FF0033; }
        .btn { width:100%; padding:14px; background:#FF0033; color:#fff; border:none; border-radius:10px; font-weight:700; cursor:pointer; text-transform:uppercase; transition: 0.3s; }
        .btn:hover { background: #cc0029; box-shadow: 0 0 15px rgba(255, 0, 51, 0.4); }
        .eye { position:absolute; right:55px; margin-top:14px; cursor:pointer; color:#FF0033; font-size: 18px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="box">
            <h1>EXOVER ACCESS</h1>
            <input type="text" id="user" placeholder="User ID">
            <div style="display:flex; position: relative;">
                <input type="password" id="pass" placeholder="Password">
                <span class="eye" onclick="tgl()">👁️</span>
            </div>
            <div style="text-align:left; font-size:12px; margin-bottom:15px; color: #888;">
                <input type="checkbox" id="rem" style="width:auto; margin-right: 5px;"> Ingat Saya
            </div>
            <button class="btn" onclick="login()">PROCEED LOGIN</button>
        </div>
    </div>
    <script>
        window.onload = () => { if(localStorage.getItem("remE")) document.getElementById('user').value = localStorage.getItem("remE"); }
        function tgl() { const p = document.getElementById('pass'); p.type = p.type === 'password' ? 'text' : 'password'; }
        function login() {
            if(document.getElementById('user').value === "Exover" && document.getElementById('pass').value === "admin123") {
                if(document.getElementById('rem').checked) localStorage.setItem("remE", "Exover");
                localStorage.setItem("ex_auth", "true");
                window.location.href = "dashboard.html";
            } else { alert("Akses Ditolak: User/Pass Salah!"); }
        }
    </script>
</body>
</html>
